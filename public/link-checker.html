<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>链接检查 - 书签导航</title>
    <meta
      name="description"
      content="批量检查书签可访问性，并把处理结果保留为可见记录。"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="/css/workspace-refresh.css?v=nav-20260602-public-home"
    />
    <link
      rel="stylesheet"
      href="/css/link-checker-enhanced.css?v=nav-20260602-admin-confirm"
    />
    <link rel="stylesheet" href="/css/admin.css?v=nav-20260603-admin-shell" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site admin-site">
    <div class="container">
      <div
        data-site-header
        data-page-key="link-checker"
        data-logo-icon="CHK"
        data-logo-text="链接检查"
        data-logo-subtitle="在清理前先确认书签是否可访问"
        class="header"
      ></div>

      <section class="workspace-section-heading">
        <div>
          <span class="section-kicker">维护</span>
          <h2 class="section-title">删除前，先把检查结果看清楚</h2>
        </div>
        <p class="section-copy">
          这个页面会加载当前书签库，逐条检查链接，并把结果保留在页面上，方便你决定保留或删除。
        </p>
      </section>

      <main class="checker-container">
        <section class="controls-section">
          <div class="checker-header">
            <h2>对已保存书签进行一轮可访问性检查</h2>
          </div>
          <p class="bookmarks-stats">
            这里只检查现有书签，不会创建或导入新数据。
          </p>
          <div class="btn-group">
            <button
              id="reloadBookmarksBtn"
              class="btn btn-secondary"
              type="button"
            >
              刷新列表
            </button>
            <button id="startCheckBtn" class="btn btn-primary" type="button">
              开始检查
            </button>
            <button
              id="deleteInaccessibleBtn"
              class="btn btn-danger"
              type="button"
            >
              删除明确异常
            </button>
            <button
              id="stopCheckBtn"
              class="btn btn-secondary hidden"
              type="button"
            >
              停止
            </button>
          </div>
        </section>

        <section class="progress-section">
          <div class="progress-header">
            <span id="progressText" class="progress-text">等待开始</span>
            <span id="progressPercent" class="progress-percent">0%</span>
          </div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div class="stats-grid" id="statsGrid">
            <button
              class="stat-item active"
              type="button"
              data-filter="all"
              aria-pressed="true"
            >
              <span class="stat-value" id="totalBookmarks">0</span>
              <span class="stat-label">总计</span>
            </button>
            <button
              class="stat-item"
              type="button"
              data-filter="checked"
              aria-pressed="false"
            >
              <span class="stat-value" id="checkedCount">0</span>
              <span class="stat-label">已检查</span>
            </button>
            <button
              class="stat-item"
              type="button"
              data-filter="accessible"
              aria-pressed="false"
            >
              <span class="stat-value" id="accessibleCount">0</span>
              <span class="stat-label">可访问</span>
            </button>
            <button
              class="stat-item"
              type="button"
              data-filter="inaccessible"
              aria-pressed="false"
            >
              <span class="stat-value" id="inaccessibleCount">0</span>
              <span class="stat-label">明确异常</span>
            </button>
            <button
              class="stat-item"
              type="button"
              data-filter="review"
              aria-pressed="false"
            >
              <span class="stat-value" id="reviewCount">0</span>
              <span class="stat-label">待确认</span>
            </button>
            <button
              class="stat-item"
              type="button"
              data-filter="kept"
              aria-pressed="false"
            >
              <span class="stat-value" id="keptCount">0</span>
              <span class="stat-label">已保留</span>
            </button>
            <button
              class="stat-item"
              type="button"
              data-filter="deleted"
              aria-pressed="false"
            >
              <span class="stat-value" id="deletedCount">0</span>
              <span class="stat-label">已删除</span>
            </button>
          </div>
        </section>

        <section class="details-section">
          <div class="details-content">
            <h4>工作方式</h4>
            <ul>
              <li>页面会先从后端加载当前书签库。</li>
              <li>开始检查后，每条书签会逐个更新状态。</li>
              <li>你可以保留单条、重新检查单条，或者直接删除。</li>
            </ul>
          </div>
        </section>

        <section id="bookmarksCard" class="bookmarks-section">
          <div class="bookmarks-header">
            <h2>书签列表</h2>
            <span id="filterStatus" class="bookmarks-stats">等待加载</span>
          </div>
          <div id="bookmarksList">
            <div class="bookmarks-stats">正在加载书签...</div>
          </div>
        </section>

        <section class="details-section">
          <div class="details-content">
            <h4>最近运行记录</h4>
            <div id="historyList">正在加载历史记录...</div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/shared/api.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/auth.js?v=nav-20260602-auth-cache"></script>
    <script src="/js/shared/site-menu.js?v=nav-20260603-header-actions"></script>
    <script src="/js/shared/admin-common.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/admin-shell.js?v=nav-20260603-admin-shell"></script>
    <script src="/js/admin/link-checker-page.js?v=nav-20260602-admin-runtime"></script>
  </body>
</html>
