    <script src="js/utils/api.js"></script>
    <script>
        // 宸ュ叿鑿滃崟鍔熻兘
        document.addEventListener('DOMContentLoaded', () => {
            const toolsMenuToggle = document.getElementById('toolsMenuToggle');
            const toolsDropdown = document.getElementById('toolsDropdown');

            if (toolsMenuToggle && toolsDropdown) {
                // 鍒囨崲涓嬫媺鑿滃崟
                toolsMenuToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    toolsDropdown.classList.toggle('show');
                    toolsMenuToggle.classList.toggle('active');
                });

                // 鐐瑰嚮鍏朵粬鍦版柟鍏抽棴鑿滃崟
                document.addEventListener('click', (e) => {
                    if (!toolsMenuToggle.contains(e.target) && !toolsDropdown.contains(e.target)) {
                        toolsDropdown.classList.remove('show');
                        toolsMenuToggle.classList.remove('active');
                    }
                });

                // 淇敼瀵嗙爜鎸夐挳浜嬩欢
                const changePasswordBtn = document.getElementById('changePasswordBtn');
                if (changePasswordBtn) {
                    changePasswordBtn.addEventListener('click', () => {
                        // 閲嶅畾鍚戝埌棣栭〉骞惰Е鍙戝瘑鐮佷慨鏀规ā鎬佹
                        window.location.href = '/?action=change-password';
                    });
                }
            }
        });

        let bookmarks = [];
        let isChecking = false;
        let checkingIndex = 0;
        let currentFilter = 'all';
        let stats = {
            total: 0,
            checked: 0,
            accessible: 0,
            inaccessible: 0,
            deleted: 0,
            kept: 0
        };

        // 椤甸潰鍔犺浇鏃舵鏌ョ櫥褰曠姸鎬佸苟鍔犺浇涔︾
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            // 鍏堟墽琛屾暟鎹簱杩佺Щ
            await performMigration();
            // 鐒跺悗鍔犺浇涔︾
            await loadBookmarks();
        });

        // 鎵ц鏁版嵁搴撹縼绉?
        async function performMigration() {
            try {
                console.log('妫€鏌ユ暟鎹簱杩佺Щ...');
                const response = await API.post('/api/system/migrate', {});
                if (response.success) {
                    console.log('鏁版嵁搴撹縼绉诲畬鎴?', response.message);
                } else {
                    console.warn('鏁版嵁搴撹縼绉诲け璐?', response.error);
                }
            } catch (error) {
                console.warn('鏁版嵁搴撹縼绉绘鏌ュけ璐?', error.message);
                // 杩佺Щ澶辫触涓嶅奖鍝嶉〉闈㈡甯镐娇鐢?
            }
        }

        // 缁戝畾浜嬩欢
        document.getElementById('startCheck').addEventListener('click', startLinkCheck);
        document.getElementById('stopCheck').addEventListener('click', stopLinkCheck);
        document.getElementById('loadBookmarks').addEventListener('click', loadBookmarks);
        document.getElementById('viewHistory').addEventListener('click', async () => {
            await loadHistory();
            toggleHistory();
        });
        document.getElementById('batchDelete').addEventListener('click', batchDeleteInaccessible);
        document.getElementById('toggleExplanation').addEventListener('click', toggleExplanation);

        // 缁戝畾缁熻椤圭瓫閫変簨浠?
        document.querySelectorAll('.stat-item').forEach(item => {
            item.addEventListener('click', function() {
                const filter = this.dataset.filter;
                currentFilter = filter;
                filterBookmarksDisplay(filter);

                // 鏇存柊娲昏穬鐘舵€?
                document.querySelectorAll('.stat-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 缁戝畾绛涢€夋寜閽拰鍒犻櫎鎸夐挳浜嬩欢
        document.addEventListener('click', (e) => {
            // 绛涢€夋寜閽?
            if (e.target.classList.contains('filter-btn') || e.target.closest('.filter-btn')) {
                const filterBtn = e.target.classList.contains('filter-btn') ? e.target : e.target.closest('.filter-btn');
                const filter = filterBtn.dataset.filter;
                setFilter(filter);
            }

            // 鍒犻櫎鎸夐挳
            if (e.target.classList.contains('delete-single-btn')) {
                const bookmarkId = e.target.dataset.bookmarkId;
                if (bookmarkId) {
                    deleteBookmark(parseInt(bookmarkId));
                }
            }

            // 淇濈暀鎸夐挳
            if (e.target.classList.contains('keep-btn')) {
                const bookmarkId = e.target.dataset.bookmarkId;
                if (bookmarkId) {
                    keepBookmark(parseInt(bookmarkId));
                }
            }

            // 鍙栨秷淇濈暀鎸夐挳
            if (e.target.classList.contains('unkeep-btn')) {
                const bookmarkId = e.target.dataset.bookmarkId;
                if (bookmarkId) {
                    unkeepBookmark(parseInt(bookmarkId));
                }
            }
        });

        // 鍔犺浇涔︾鍒楄〃
        async function loadBookmarks() {
            try {
                const response = await API.get('/api/system/check-links-stream');
                if (response.success && response.data) {
                    const newBookmarks = response.data;

                    // 纭繚 newBookmarks 鏄暟缁?
                    if (!Array.isArray(newBookmarks)) {
                        throw new Error('鏈嶅姟鍣ㄨ繑鍥炵殑鏁版嵁鏍煎紡涓嶆纭?);
                    }

                    // 濡傛灉宸叉湁涔︾鏁版嵁锛屼繚鐣欐鏌ョ姸鎬?
                    if (bookmarks && bookmarks.length > 0) {
                        const checkedBookmarksMap = new Map();
                        bookmarks.forEach(bookmark => {
                            if (bookmark.checked) {
                                checkedBookmarksMap.set(bookmark.id, {
                                    checked: bookmark.checked,
                                    checkedTime: bookmark.checkedTime,
                                    accessible: bookmark.accessible,
                                    status: bookmark.status,
                                    statusCode: bookmark.statusCode,
                                    statusText: bookmark.statusText,
                                    error: bookmark.error,
                                    keepStatus: bookmark.keepStatus,
                                    deleted: bookmark.deleted
                                });
                            }
                        });

                        newBookmarks.forEach(bookmark => {
                            const checkedData = checkedBookmarksMap.get(bookmark.id);
                            if (checkedData) {
                                Object.assign(bookmark, checkedData);
                            }
                        });
                    }

                    bookmarks = newBookmarks;
                    stats.total = bookmarks.length;
                    recalculateStats();
                    displayBookmarks();
                    updateStats();
                } else {
                    throw new Error(response.error || '鏈嶅姟鍣ㄥ搷搴斿紓甯?);
                }
            } catch (error) {
                console.error('鍔犺浇涔︾澶辫触:', error);
                document.getElementById('bookmarksList').innerHTML =
                    '<div class="error">鍔犺浇澶辫触: ' + error.message + '</div>';
                // 纭繚 bookmarks 浠嶇劧鏄暟缁?
                if (!Array.isArray(bookmarks)) {
                    bookmarks = [];
                }
            }
        }

        // 閲嶆柊璁＄畻缁熻鏁版嵁
        function recalculateStats() {
            stats.checked = 0;
            stats.accessible = 0;
            stats.inaccessible = 0;
            stats.deleted = 0;

            bookmarks.forEach(bookmark => {
                if (bookmark.checked) {
                    stats.checked++;
                    if (bookmark.deleted) {
                        stats.deleted++;
                    } else if (bookmark.accessible) {
                        stats.accessible++;
                    } else {
                        stats.inaccessible++;
                    }
                }
            });
        }

        // 璁剧疆绛涢€夊櫒
        function setFilter(filter) {
            currentFilter = filter;

            // 鏇存柊绛涢€夋寜閽姸鎬?
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-filter="${filter}"]`).classList.add('active');

            // 閲嶆柊鏄剧ず涔︾鍒楄〃
            displayBookmarks();
        }

        // 绛涢€変功绛?
        function filterBookmarks(bookmarks) {
            if (currentFilter === 'all') {
                return bookmarks;
            }

            return bookmarks.filter(bookmark => {
                switch (currentFilter) {
                    case 'checked':
                        return bookmark.checked === true;
                    case 'accessible':
                        return bookmark.status === 'accessible';
                    case 'inaccessible':
                        return bookmark.status === 'inaccessible';
                    case 'deleted':
                        return bookmark.status === 'deleted';
                    case 'kept':
                        return bookmark.keepStatus === 'keep';
                    default:
                        return true;
                }
            });
        }

        // 涓烘樉绀烘帓搴忎功绛撅細妫€鏌ユ椂鍙樉绀哄凡妫€鏌ョ殑锛屾湭妫€鏌ユ椂鏄剧ず鍏ㄩ儴
        function sortBookmarksForDisplay(bookmarks) {
            // 濡傛灉姝ｅ湪妫€鏌ワ紝鍙樉绀哄凡妫€鏌ョ殑涔︾鍜屾鍦ㄦ鏌ョ殑涔︾
            let filteredBookmarks = bookmarks;
            if (isChecking) {
                filteredBookmarks = bookmarks.filter(bookmark =>
                    bookmark.checked || bookmark.status === 'checking'
                );
            }

            return filteredBookmarks.sort((a, b) => {
                // 濡傛灉涓嶅湪妫€鏌ヤ腑锛屾寜鍘熸潵鐨勯€昏緫锛氭湭妫€鏌ョ殑鍦ㄥ墠
                if (!isChecking) {
                    if (a.checked !== b.checked) {
                        return a.checked ? 1 : -1; // false (鏈鏌? 鍦ㄥ墠锛宼rue (宸叉鏌? 鍦ㄥ悗
                    }

                    // 濡傛灉閮芥槸鏈鏌ョ殑锛屾寜鍘熷椤哄簭锛圛D锛夋帓搴?
                    if (!a.checked && !b.checked) {
                        return a.id - b.id;
                    }

                    // 濡傛灉閮芥槸宸叉鏌ョ殑锛屾寜鐘舵€佷紭鍏堢骇鎺掑簭
                    if (a.checked && b.checked) {
                        const statusPriority = {
                            'accessible': 1,    // 鍙闂殑
                            'inaccessible': 2,  // 涓嶅彲璁块棶鐨?
                            'deleted': 3        // 宸插垹闄ょ殑鍦ㄦ渶鍚?
                        };

                        const aPriority = statusPriority[a.status] || 999;
                        const bPriority = statusPriority[b.status] || 999;

                        if (aPriority !== bPriority) {
                            return aPriority - bPriority;
                        }

                        // 鍚岀姸鎬佹寜ID鎺掑簭
                        return a.id - b.id;
                    }
                } else {
                    // 妫€鏌ヤ腑鐨勬帓搴忛€昏緫锛氭鍦ㄦ鏌ョ殑鍦ㄦ渶鍓嶏紝鐒跺悗鎸夋鏌ュ畬鎴愮殑鏃堕棿鍊掑簭
                    if (a.status === 'checking' && b.status !== 'checking') {
                        return -1; // 姝ｅ湪妫€鏌ョ殑鍦ㄦ渶鍓?
                    }
                    if (b.status === 'checking' && a.status !== 'checking') {
                        return 1;
                    }

                    // 濡傛灉閮芥槸宸叉鏌ュ畬鎴愮殑锛屾寜妫€鏌ュ畬鎴愭椂闂村€掑簭锛堟渶鏂版鏌ョ殑鍦ㄤ笂闈級
                    if (a.checked && b.checked && a.status !== 'checking' && b.status !== 'checking') {
                        // 浣跨敤妫€鏌ュ畬鎴愭椂闂存埑锛屽鏋滄病鏈夊垯浣跨敤ID鍊掑簭
                        const aTime = a.checkedTime || (999999 - a.id);
                        const bTime = b.checkedTime || (999999 - b.id);
                        return bTime - aTime; // 鍊掑簭锛氭渶鏂扮殑鍦ㄤ笂闈?
                    }
                }

                return 0;
            });
        }

        // 鏄剧ず涔︾鍒楄〃
        function displayBookmarks() {
            const bookmarksList = document.getElementById('bookmarksList');
            const filterStatus = document.getElementById('filterStatus');

            // 纭繚 bookmarks 鏄暟缁?
            if (!Array.isArray(bookmarks) || bookmarks.length === 0) {
                bookmarksList.innerHTML = '<div class="empty-state">鏆傛棤涔︾</div>';
                if (filterStatus) filterStatus.textContent = '';
                return;
            }

            const filteredBookmarks = filterBookmarks(bookmarks);
            updateFilterStatus(filteredBookmarks.length);

            if (filteredBookmarks.length === 0) {
                bookmarksList.innerHTML = `<div class="empty-state">娌℃湁绗﹀悎绛涢€夋潯浠剁殑涔︾</div>`;

            }

            bookmarksList.innerHTML = sortedBookmarks.map((bookmark, index) => {

                        <div class="bookmark-url">
                            <a href="${bookmark.url || '#'}" target="_blank" rel="noopener noreferrer" title="鐐瑰嚮鍦ㄦ柊鏍囩椤典腑鎵撳紑">
                                ${bookmark.url || '鏃燯RL'}
                            </a>
                        </div>
                    </div>
                    <div class="bookmark-meta">
                        <div class="bookmark-category" style="background-color: ${bookmark.categoryColor || '#6B7280'}">

            // 纭繚鎿嶄綔鎸夐挳瀵逛笉鍙闂殑涔︾鍙
            setTimeout(() => {
                ensureActionButtonsVisible();
            }, 100);
        }

        // 鑾峰彇缁撴灉鏂囨湰
        function getResultText(bookmark) {
            if (!bookmark.checked) {
                return '绛夊緟妫€鏌?;
            }

            switch (bookmark.status) {
                case 'checking':
                    return '妫€鏌ヤ腑...';
                case 'accessible':
                    return `${bookmark.statusCode} ${bookmark.statusText}`;
                case 'inaccessible':
                    return bookmark.error || `${bookmark.statusCode} ${bookmark.statusText}`;
                case 'deleted':
                    return '宸插垹闄?;
                default:
                    return '绛夊緟妫€鏌?;
            }
        }

        // 鑾峰彇鐘舵€佸浘鏍?
        function getStatusIcon(bookmark, displayIndex) {
            switch (bookmark.status) {
                case 'pending':
                    return displayIndex; // 鏄剧ず搴忓彿
                case 'checking':
                    return '鈴?;
                case 'accessible':
                    return '鉁?;
                case 'inaccessible':
                    return '鉁?;
                case 'deleted':
                    return '馃棏锔?;
                default:
                    return displayIndex; // 榛樿鏄剧ず搴忓彿
            }
        }

        // 纭繚鎿嶄綔鎸夐挳瀵逛笉鍙闂殑涔︾鍙
        function ensureActionButtonsVisible() {
            bookmarks.forEach(bookmark => {
                if ((bookmark.status === 'inaccessible' || (bookmark.checked && !bookmark.accessible)) && !bookmark.deleted) {
                    const actionsContainer = document.getElementById(`actions-${bookmark.id}`);
                    if (actionsContainer && (!actionsContainer.innerHTML.trim() || !actionsContainer.querySelector('.bookmark-actions'))) {
                        const actionsHtml = `
                            <div class="bookmark-actions">
                                <button class="keep-btn" data-bookmark-id="${bookmark.id}" title="鏍囪涓轰繚鐣欙紙涓嶅啀寤鸿鍒犻櫎锛?>
                                    馃搶 淇濈暀
                                </button>
                                <button class="delete-single-btn" data-bookmark-id="${bookmark.id}" title="鍒犻櫎姝や功绛?>
                                    馃棏锔?鍒犻櫎
                                </button>
                            </div>
                        `;
                        actionsContainer.innerHTML = actionsHtml;
                    }
                }
            });
        }

        // 鎵嬪姩瑙﹀彂鎸夐挳鏄剧ず锛堢敤浜庢祴璇曪級
        window.forceShowButtons = function() {
            console.log('鎵嬪姩瑙﹀彂鎸夐挳鏄剧ず...');
            ensureActionButtonsVisible();
        };

        // 鑾峰彇涔︾鎿嶄綔鎸夐挳
        function getBookmarkActions(bookmark) {
            // 濡傛灉宸插垹闄わ紝涓嶆樉绀轰换浣曟搷浣?
            if (bookmark.deleted || bookmark.status === 'deleted') {
                return '';
            }

            // 濡傛灉宸叉爣璁颁负淇濈暀
            if (bookmark.keepStatus === 'keep') {
                return `<div class="bookmark-actions">
                    <span class="keep-status">馃搶 宸蹭繚鐣?/span>
                    <button class="unkeep-btn" data-bookmark-id="${bookmark.id}" title="鍙栨秷淇濈暀鏍囪">
                        鉂?鍙栨秷淇濈暀
                    </button>
                    ${bookmark.status === 'inaccessible' ?
                        `<button class="delete-single-btn" data-bookmark-id="${bookmark.id}" title="鍒犻櫎姝や功绛?>
                            馃棏锔?鍒犻櫎
                        </button>` : ''
                    }
                </div>`;
            }

            // 濡傛灉鏄笉鍙闂殑涔︾ - 寮哄埗鏄剧ず鎸夐挳
            if (bookmark.status === 'inaccessible' || (bookmark.checked && !bookmark.accessible)) {
                return `<div class="bookmark-actions">
                    <button class="keep-btn" data-bookmark-id="${bookmark.id}" title="鏍囪涓轰繚鐣欙紙涓嶅啀寤鸿鍒犻櫎锛?>
                        馃搶 淇濈暀
                    </button>
                    <button class="delete-single-btn" data-bookmark-id="${bookmark.id}" title="鍒犻櫎姝や功绛?>
                        馃棏锔?鍒犻櫎
                    </button>
                </div>`;
            }

            // 鍏朵粬鎯呭喌涓嶆樉绀烘搷浣滄寜閽?
            return '';
        }

        // 鏇存柊绛涢€夌姸鎬佹樉绀?
        function updateFilterStatus(filteredCount) {
            const filterStatus = document.getElementById('filterStatus');

            if (isChecking) {
                // 妫€鏌ユ椂鏄剧ず鐗规畩淇℃伅
                filterStatus.textContent = `妫€鏌ヤ腑锛氭樉绀哄凡妫€鏌ョ殑涔︾ (${filteredCount} 涓?`;
            } else if (currentFilter === 'all') {
                filterStatus.textContent = `鏄剧ず鍏ㄩ儴 ${filteredCount} 涓功绛綻;
            } else {
                const filterNames = {
                    'checked': '宸叉鏌?,
                    'accessible': '鍙闂?,
                    'inaccessible': '涓嶅彲璁块棶',
                    'deleted': '宸插垹闄?,
                    'kept': '宸蹭繚鐣?
                };
                filterStatus.textContent = `绛涢€? ${filterNames[currentFilter]} (${filteredCount}/${bookmarks.length})`;
            }
        }

        // 寮€濮嬫鏌?
        async function startLinkCheck() {
            if (isChecking) return;

            const smartCheck = document.getElementById('smartCheck').checked;
            const retryCount = parseInt(document.getElementById('retryCount').value);
            const checkDelay = parseInt(document.getElementById('checkDelay').value);

            if (bookmarks.length === 0) {
                alert('娌℃湁涔︾闇€瑕佹鏌?);
                return;
            }

            isChecking = true;
            checkingIndex = 0;
            stats = { total: bookmarks.length, checked: 0, accessible: 0, inaccessible: 0, deleted: 0 };

            // 鏇存柊UI鐘舵€?
            document.getElementById('startCheck').classList.add('hidden');
            document.getElementById('stopCheck').classList.remove('hidden');
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('batchDelete').classList.add('hidden'); // 闅愯棌鎵归噺鍒犻櫎鎸夐挳

            // 閲嶇疆鎵€鏈変功绛剧姸鎬?
            bookmarks.forEach(bookmark => {
                bookmark.status = 'pending';
                bookmark.checked = false;
                bookmark.retryCount = 0;
                bookmark.deleted = false; // 閲嶇疆鍒犻櫎鐘舵€?
                updateBookmarkDisplay(bookmark);
            });

            // 寮€濮嬫鏌ユ椂閲嶆柊鏄剧ず涔︾鍒楄〃锛堝彧鏄剧ず宸叉鏌ョ殑锛?
            displayBookmarks();

            // 寮€濮嬮€愪釜妫€鏌?
            await checkNextBookmark(smartCheck, retryCount, checkDelay);
        }

        // 妫€鏌ヤ笅涓€涓功绛?
        async function checkNextBookmark(smartCheck, retryCount, checkDelay) {
            if (!isChecking || checkingIndex >= bookmarks.length) {
                finishChecking();
                return;
            }

            const bookmark = bookmarks[checkingIndex];

            // 鏇存柊褰撳墠涔︾涓烘鏌ヤ腑鐘舵€?
            bookmark.status = 'checking';
            updateBookmarkDisplay(bookmark);
            updateProgress();

            try {
                const result = await checkBookmarkWithRetry(bookmark, smartCheck, retryCount);

                bookmark.checked = true;
                bookmark.checkedTime = Date.now(); // 璁板綍妫€鏌ュ畬鎴愭椂闂?
                bookmark.accessible = result.accessible;
                bookmark.status = result.accessible ? 'accessible' : 'inaccessible';
                bookmark.statusCode = result.status;
                bookmark.statusText = result.statusText;
                bookmark.error = result.error;
                bookmark.deleted = false;

                // 鏅鸿兘妫€鏌ラ€昏緫 - 娣诲姞璇︾粏寤鸿淇℃伅
                if (!result.accessible && smartCheck) {
                    const recommendation = getDeleteRecommendation(result);
                    bookmark.error = `${result.error} (${recommendation.reason})`;
                    bookmark.deleteRecommendation = recommendation;
                } else if (!result.accessible) {
                    bookmark.error = result.error;
                }

                // 鏇存柊缁熻
                stats.checked++;
                if (result.accessible) {
                    stats.accessible++;
                } else {
                    stats.inaccessible++;
                }

                updateBookmarkDisplay(bookmark);
                updateStats();

            } catch (error) {
                console.error(`妫€鏌ヤ功绛惧け璐?(${bookmark.title}):`, error);
                bookmark.checked = true;
                bookmark.checkedTime = Date.now(); // 璁板綍妫€鏌ュ畬鎴愭椂闂?
                bookmark.accessible = false;
                bookmark.status = 'inaccessible';
                bookmark.error = error.message;
                stats.checked++;
                stats.inaccessible++;
                updateBookmarkDisplay(bookmark);
                updateStats();
            }

            checkingIndex++;

            // 寤惰繜鍚庢鏌ヤ笅涓€涓?
            if (isChecking) {
                setTimeout(() => checkNextBookmark(smartCheck, retryCount, checkDelay), checkDelay);
            }
        }

        // 甯﹂噸璇曠殑涔︾妫€鏌?
        async function checkBookmarkWithRetry(bookmark, smartCheck, maxRetries) {
            let lastResult = null;

            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const response = await API.post('/api/system/check-links-stream', {
                        bookmarkId: bookmark.id,
                        url: bookmark.url,
                        attempt: attempt,
                        maxRetries: maxRetries
                    });

                    if (response.success) {
                        lastResult = response.data;

                        // 濡傛灉鎴愬姛璁块棶锛岀洿鎺ヨ繑鍥?
                        if (lastResult.accessible) {
                            return lastResult;
                        }

                        // 濡傛灉鏄渶鍚庝竴娆″皾璇曪紝杩斿洖缁撴灉
                        if (attempt === maxRetries) {
                            return lastResult;
                        }

                        // 濡傛灉涓嶆槸鏈€鍚庝竴娆★紝绛夊緟涓€涓嬪啀閲嶈瘯
                        if (attempt < maxRetries) {
                            await new Promise(resolve => setTimeout(resolve, 1000));
                        }
                    } else {
                        throw new Error(response.error);
                    }
                } catch (error) {
                    lastResult = {
                        accessible: false,
                        status: 0,
                        statusText: 'Network Error',
                        error: error.message
                    };

                    if (attempt < maxRetries) {
                        await new Promise(resolve => setTimeout(resolve, 1000));
                    }
                }
            }

            return lastResult;
        }

        // 鏅鸿兘鍒ゆ柇鏄惁搴旇鍒犻櫎涔︾ - 鏇存柊鐗堟湰锛屾洿濂藉湴澶勭悊Cloudflare绛夋儏鍐?
        function shouldDeleteBookmark(result) {
            // 濡傛灉缃戠珯鍙闂紝涓嶅垹闄?
            if (result.accessible) {
                return false;
            }

            // 鏄庣‘鐨勯敊璇被鍨嬶紝寤鸿鍒犻櫎
            const deleteReasons = [
                '鍩熷悕涓嶅瓨鍦?,        // 鍩熷悕纭疄涓嶅瓨鍦?
                '杩炴帴琚嫆缁?,        // 鏈嶅姟鍣ㄦ嫆缁濊繛鎺?
                'SSL璇佷功闂'        // 璇佷功闂
            ];

            // 鏄庣‘鐨凥TTP鐘舵€佺爜锛屽缓璁垹闄?
            const deleteStatusCodes = [
                404, // 椤甸潰涓嶅瓨鍦?
                410  // 椤甸潰宸叉案涔呭垹闄?
            ];

            // 搴旇淇濈暀鐨勬儏鍐碉紙鍙兘鏄复鏃堕棶棰樻垨闃叉姢鏈哄埗锛?
            const keepReasons = [
                'Cloudflare闃叉姢',    // Cloudflare闃叉姢
                '璇锋眰瓒呮椂',          // 鍙兘鏄綉缁滈棶棰?
                '缃戠珯鍝嶅簲缂撴參',      // 鍝嶅簲鎱絾鍙兘姝ｅ父
                '鏈嶅姟鍣ㄥ唴閮ㄩ敊璇?,    // 500閿欒鍙兘鏄复鏃剁殑
                '缃戝叧閿欒',          // 502閿欒鍙兘鏄复鏃剁殑
                '鏈嶅姟鏆傛椂涓嶅彲鐢?,    // 503鍙兘鏄淮鎶?
                '缃戝叧瓒呮椂',          // 504鍙兘鏄复鏃剁殑
                '璇锋眰杩囦簬棰戠箒',      // 429闄愭祦
                '璁块棶琚姝?,        // 403鍙兘闇€瑕佺櫥褰?
                '缃戠粶杩炴帴闂'       // 缃戠粶闂
            ];

            // 妫€鏌ユ槸鍚﹀簲璇ヤ繚鐣?
            if (result.error) {
                for (const reason of keepReasons) {
                    if (result.error.includes(reason)) {
                        return false; // 寤鸿淇濈暀
                    }
                }

                // 妫€鏌ユ槸鍚﹀簲璇ュ垹闄?
                for (const reason of deleteReasons) {
                    if (result.error.includes(reason)) {
                        return true; // 寤鸿鍒犻櫎
                    }
                }
            }

            // 妫€鏌ョ姸鎬佺爜
            if (deleteStatusCodes.includes(result.status)) {
                return true; // 寤鸿鍒犻櫎
            }

            // 榛樿鎯呭喌锛氬鏋滀笉纭畾锛屽缓璁繚鐣欙紙瀹夊叏浼樺厛锛?
            return false;
        }

        // 鑾峰彇鍒犻櫎寤鸿鐨勮缁嗚鏄?
        function getDeleteRecommendation(result) {
            if (result.accessible) {
                return { shouldDelete: false, reason: '缃戠珯鍙甯歌闂? };
            }

            const shouldDelete = shouldDeleteBookmark(result);

            if (shouldDelete) {
                if (result.status === 404) {
                    return { shouldDelete: true, reason: '椤甸潰涓嶅瓨鍦紝寤鸿鍒犻櫎' };
                }
                if (result.status === 410) {
                    return { shouldDelete: true, reason: '椤甸潰宸叉案涔呭垹闄わ紝寤鸿鍒犻櫎' };
                }
                if (result.error && result.error.includes('鍩熷悕涓嶅瓨鍦?)) {
                    return { shouldDelete: true, reason: '鍩熷悕涓嶅瓨鍦紝寤鸿鍒犻櫎' };
                }
                return { shouldDelete: true, reason: '缃戠珯纭疄澶辨晥锛屽缓璁垹闄? };
            } else {
                if (result.error && result.error.includes('Cloudflare闃叉姢')) {
                    return { shouldDelete: false, reason: 'Cloudflare闃叉姢锛岀綉绔欐甯革紝寤鸿淇濈暀' };
                }
                if (result.error && result.error.includes('瓒呮椂')) {
                    return { shouldDelete: false, reason: '缃戠粶瓒呮椂锛屽彲鑳芥槸涓存椂闂锛屽缓璁繚鐣? };
                }
                if (result.status >= 500) {
                    return { shouldDelete: false, reason: '鏈嶅姟鍣ㄩ敊璇紝鍙兘鏄复鏃堕棶棰橈紝寤鸿淇濈暀' };
                }
                return { shouldDelete: false, reason: '鍙兘鏄复鏃堕棶棰橈紝寤鸿淇濈暀' };
            }
        }

        // 鍋滄妫€鏌?
        function stopLinkCheck() {
            isChecking = false;
            finishChecking();
        }

        // 瀹屾垚妫€鏌?
        function finishChecking() {
            isChecking = false;
            document.getElementById('startCheck').classList.remove('hidden');
            document.getElementById('stopCheck').classList.add('hidden');

            updateProgress();

            // 鏄剧ず瀹屾垚娑堟伅
            const message = `妫€鏌ュ畬鎴愶紒鎬昏: ${stats.total}, 鍙闂? ${stats.accessible}, 涓嶅彲璁块棶: ${stats.inaccessible}${stats.deleted > 0 ? `, 宸插垹闄? ${stats.deleted}` : ''}`;
            document.getElementById('progressText').textContent = message;

            // 妫€鏌ュ畬鎴愬悗閲嶆柊鏄剧ず鎵€鏈変功绛?
            displayBookmarks();

            // 濡傛灉鏈変笉鍙闂殑閾炬帴锛屾樉绀烘壒閲忓垹闄ゆ寜閽?
            const inaccessibleCount = bookmarks.filter(b => b.status === 'inaccessible' && !b.deleted).length;
            const batchDeleteBtn = document.getElementById('batchDelete');
            if (inaccessibleCount > 0) {
                batchDeleteBtn.classList.remove('hidden');
                batchDeleteBtn.innerHTML = `<span class="btn-icon">馃棏锔?/span>鍒犻櫎鎵€鏈夋棤鏁堥摼鎺?(${inaccessibleCount})`;
            } else {
                batchDeleteBtn.classList.add('hidden');
            }
        }

        // 鎵归噺鍒犻櫎涓嶅彲璁块棶鐨勪功绛?
        async function batchDeleteInaccessible() {
            const inaccessibleBookmarks = bookmarks.filter(b => b.status === 'inaccessible' && !b.deleted);

            if (inaccessibleBookmarks.length === 0) {
                showMessage('娌℃湁闇€瑕佸垹闄ょ殑鏃犳晥閾炬帴', 'info');
                return;
            }

            const confirmMessage = `鈿狅笍 鎵归噺鍒犻櫎纭\n\n纭畾瑕佸垹闄ゆ墍鏈?${inaccessibleBookmarks.length} 涓棤鏁堥摼鎺ュ悧锛焅n\n灏嗗垹闄や互涓嬩功绛撅細\n${inaccessibleBookmarks.slice(0, 5).map(b => `鈥?${b.title}`).join('\n')}${inaccessibleBookmarks.length > 5 ? `\n... 杩樻湁 ${inaccessibleBookmarks.length - 5} 涓猔 : ''}\n\n鈿狅笍 閲嶈鎻愰啋锛歕n鈥?姝ゆ搷浣滀笉鍙挙閿€锛乗n鈥?寤鸿鍏堟墜鍔ㄦ鏌ュ嚑涓摼鎺ョ‘璁n鈥?鏌愪簺缃戠珯鍙兘涓存椂鏃犳硶璁块棶\n\n纭畾缁х画鍚楋紵`;

            if (!confirm(confirmMessage)) {
                return;
            }

            let deletedCount = 0;
            let failedCount = 0;

            for (const bookmark of inaccessibleBookmarks) {
                try {
                    // 鍑嗗鍒犻櫎璇锋眰锛屽寘鍚鏌ョ姸鎬佷俊鎭?
                    const deleteData = {
                        reason: 'batch_delete_inaccessible',
                        checkStatus: bookmark.status,
                        statusCode: bookmark.statusCode,
                        statusText: bookmark.statusText,
                        errorMessage: bookmark.error,
                        keepStatus: bookmark.keepStatus
                    };

                    const response = await API.request(`/api/bookmarks/${bookmark.id}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(deleteData)
                    });

                    if (response.success) {
                        bookmark.deleted = true;
                        bookmark.status = 'deleted';
                        deletedCount++;
                    } else {
                        failedCount++;
                        console.error(`鍒犻櫎涔︾澶辫触: ${bookmark.title}`, response.error);
                    }
                } catch (error) {
                    failedCount++;
                    console.error(`鍒犻櫎涔︾澶辫触: ${bookmark.title}`, error);
                }
            }

            // 鏇存柊缁熻
            stats.deleted += deletedCount;
            stats.inaccessible -= deletedCount;

            // 鏇存柊鏄剧ず
            updateStats();
            displayBookmarks();

            // 闅愯棌鎵归噺鍒犻櫎鎸夐挳
            document.getElementById('batchDelete').classList.add('hidden');

            // 鏄剧ず缁撴灉娑堟伅
            if (failedCount === 0) {
                showMessage(`鎴愬姛鍒犻櫎 ${deletedCount} 涓棤鏁堥摼鎺, 'success');
            } else {
                showMessage(`鍒犻櫎瀹屾垚锛氭垚鍔?${deletedCount} 涓紝澶辫触 ${failedCount} 涓猔, 'info');
            }
        }

        // 鏇存柊涔︾鏄剧ず
        function updateBookmarkDisplay(bookmark) {
            const importantStatusChanges = ['checking', 'accessible', 'inaccessible', 'deleted'];
            if (importantStatusChanges.includes(bookmark.status)) {
                displayBookmarks();
                setTimeout(() => {
                    ensureActionButtonsVisible();
                }, 50);
                return;
            }

            // 瀵逛簬闈為噸瑕佺姸鎬佸彉鍖栵紝鍙洿鏂板崟涓厓绱?
            const bookmarkElement = document.getElementById(`bookmark-${bookmark.id}`);
            const statusElement = document.getElementById(`status-${bookmark.id}`);
            const resultElement = document.getElementById(`result-${bookmark.id}`);

            if (!bookmarkElement) {
                // 濡傛灉褰撳墠绛涢€変笅鐪嬩笉鍒拌繖涓功绛撅紝閲嶆柊鏄剧ず鍒楄〃
                displayBookmarks();
                return;
            }

            // 鏇存柊涔︾椤规牱寮?
            bookmarkElement.className = `bookmark-item ${bookmark.status}`;

            // 鏇存柊鐘舵€佸浘鏍?
            statusElement.className = `bookmark-status status-${bookmark.status}`;

            let statusIcon = '';
            let resultText = getResultText(bookmark);

            switch (bookmark.status) {
                case 'pending':
                    statusIcon = bookmarkElement.dataset.index ? parseInt(bookmarkElement.dataset.index) + 1 : '?';
                    break;
                case 'checking':
                    statusIcon = '鈴?;
                    break;
                case 'accessible':
                    statusIcon = '鉁?;
                    break;
                case 'inaccessible':
                    statusIcon = '鉁?;
                    break;
                case 'deleted':
                    statusIcon = '馃棏锔?;
                    break;
            }

            statusElement.textContent = statusIcon;
            resultElement.textContent = resultText;
        }

        // 鏇存柊缁熻淇℃伅
        function updateStats() {
            // 閲嶆柊璁＄畻缁熻鏁版嵁
            stats.total = bookmarks.length;
            stats.checked = bookmarks.filter(b => b.checked).length;
            stats.accessible = bookmarks.filter(b => b.status === 'accessible').length;
            stats.inaccessible = bookmarks.filter(b => b.status === 'inaccessible' && !b.deleted).length;
            stats.deleted = bookmarks.filter(b => b.deleted || b.status === 'deleted').length;
            stats.kept = bookmarks.filter(b => b.keepStatus === 'keep').length;

            // 鏇存柊鏄剧ず
            document.getElementById('totalBookmarks').textContent = stats.total;
            document.getElementById('checkedCount').textContent = stats.checked;
            document.getElementById('accessibleCount').textContent = stats.accessible;
            document.getElementById('inaccessibleCount').textContent = stats.inaccessible;
            document.getElementById('deletedCount').textContent = stats.deleted;
            document.getElementById('keptCount').textContent = stats.kept;
        }

        // 鏇存柊杩涘害
        function updateProgress() {
            const percentage = stats.total > 0 ? Math.round((stats.checked / stats.total) * 100) : 0;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressPercent').textContent = `${percentage}%`;

            if (isChecking && checkingIndex < bookmarks.length) {
                const currentBookmark = bookmarks[checkingIndex];
                document.getElementById('progressText').textContent = `姝ｅ湪妫€鏌? ${currentBookmark.title}`;
            }
        }

        // 鍒犻櫎鍗曚釜涔︾
        async function deleteBookmark(bookmarkId) {
            const bookmark = bookmarks.find(b => b.id == bookmarkId); // 浣跨敤 == 鑰屼笉鏄?=== 鏉ュ鐞嗙被鍨嬭浆鎹?
            if (!bookmark) {
                console.error('鏈壘鍒颁功绛撅紝ID:', bookmarkId);
                return;
            }

            if (!confirm(`鈿狅笍 鍒犻櫎纭\n\n纭畾瑕佸垹闄や功绛?"${bookmark.title}" 鍚楋紵\n\nURL: ${bookmark.url}\n\n鈿狅笍 娉ㄦ剰锛歕n鈥?姝ゆ搷浣滀笉鍙挙閿€锛乗n鈥?寤鸿鍏堟墜鍔ㄨ闂‘璁ら摼鎺ョ‘瀹炴棤鏁圽n鈥?鏌愪簺缃戠珯鍙兘鍙槸涓存椂鏃犳硶璁块棶\n\n纭畾鍒犻櫎鍚楋紵`)) {
                return;
            }

            try {
                // 鍑嗗鍒犻櫎璇锋眰锛屽寘鍚鏌ョ姸鎬佷俊鎭?
                const deleteData = {
                    reason: bookmark.status === 'inaccessible' ? 'link_check_failed' : 'manual_delete',
                    checkStatus: bookmark.status,
                    statusCode: bookmark.statusCode,
                    statusText: bookmark.statusText,
                    errorMessage: bookmark.error,
                    keepStatus: bookmark.keepStatus
                };

                const response = await API.request(`/api/bookmarks/${bookmarkId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(deleteData)
                });

                if (response.success) {
                    // 鏇存柊涔︾鐘舵€佷负宸插垹闄?
                    bookmark.deleted = true;
                    bookmark.status = 'deleted';
                    stats.deleted++;
                    stats.inaccessible--;

                    updateBookmarkDisplay(bookmark);
                    updateStats();
                    displayBookmarks(); // 閲嶆柊鏄剧ず浠ユ洿鏂板垹闄ゆ寜閽?

                    // 鏄剧ず鎴愬姛娑堟伅
                    showMessage(`涔︾ "${bookmark.title}" 宸插垹闄, 'success');
                } else {
                    showMessage('鍒犻櫎澶辫触: ' + response.error, 'error');
                }
            } catch (error) {
                showMessage('鍒犻櫎澶辫触: ' + error.message, 'error');
            }
        }

        // 鏄剧ず娑堟伅鎻愮ず
        function showMessage(text, type = 'info') {
            const message = document.createElement('div');
            message.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                border-radius: 6px;
                color: white;
                font-weight: 500;
                z-index: 1001;
                animation: slideIn 0.3s ease-out;
                background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'};
            `;
            message.textContent = text;

            // 娣诲姞鍔ㄧ敾鏍峰紡
            if (!document.querySelector('#message-styles')) {
                const style = document.createElement('style');
                style.id = 'message-styles';
                style.textContent = `
                    @keyframes slideIn {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                `;
                document.head.appendChild(style);
            }

            document.body.appendChild(message);

            // 鑷姩绉婚櫎
            setTimeout(() => {
                message.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => message.remove(), 300);
            }, 3000);
        }

        // 鏍囪涔︾涓轰繚鐣?
        async function keepBookmark(bookmarkId) {
            const bookmark = bookmarks.find(b => b.id == bookmarkId);
            if (!bookmark) {
                console.error('鏈壘鍒颁功绛撅紝ID:', bookmarkId);
                return;
            }

            if (!confirm(`纭畾瑕佹爣璁颁功绛?"${bookmark.title}" 涓轰繚鐣欏悧锛焅n\n鏍囪涓轰繚鐣欏悗锛歕n鈥?鍗充娇妫€鏌ュけ璐ヤ篃涓嶄細寤鸿鍒犻櫎\n鈥?鍙互闅忔椂鍙栨秷淇濈暀鏍囪\n鈥?浠嶄細鍙備笌閾炬帴妫€鏌)) {
                return;
            }

            try {
                const response = await API.post('/api/bookmarks/keep-status', {
                    bookmarkId: bookmarkId,
                    keepStatus: 'keep'
                });

                if (response.success) {
                    // 鏇存柊涔︾鐘舵€?
                    bookmark.keepStatus = 'keep';

                    // 閲嶆柊鏄剧ず涔︾鍒楄〃
                    displayBookmarks();

                    // 鏄剧ず鎴愬姛娑堟伅
                    showMessage(`涔︾ "${bookmark.title}" 宸叉爣璁颁负淇濈暀`, 'success');
                } else {
                    showMessage('鏍囪淇濈暀澶辫触: ' + response.error, 'error');
                }
            } catch (error) {
                showMessage('鏍囪淇濈暀澶辫触: ' + error.message, 'error');
            }
        }

        // 鍙栨秷涔︾淇濈暀鏍囪
        async function unkeepBookmark(bookmarkId) {
            const bookmark = bookmarks.find(b => b.id == bookmarkId);
            if (!bookmark) {
                console.error('鏈壘鍒颁功绛撅紝ID:', bookmarkId);
                return;
            }

            if (!confirm(`纭畾瑕佸彇娑堜功绛?"${bookmark.title}" 鐨勪繚鐣欐爣璁板悧锛焅n\n鍙栨秷鍚庯細\n鈥?濡傛灉閾炬帴妫€鏌ュけ璐ワ紝浼氶噸鏂板缓璁垹闄n鈥?鍙互閲嶆柊鏍囪涓轰繚鐣檂)) {
                return;
            }

            try {
                const response = await API.post('/api/bookmarks/keep-status', {
                    bookmarkId: bookmarkId,
                    keepStatus: 'normal'
                });

                if (response.success) {
                    // 鏇存柊涔︾鐘舵€?
                    bookmark.keepStatus = 'normal';

                    // 閲嶆柊鏄剧ず涔︾鍒楄〃
                    displayBookmarks();

                    // 鏄剧ず鎴愬姛娑堟伅
                    showMessage(`涔︾ "${bookmark.title}" 宸插彇娑堜繚鐣欐爣璁癭, 'success');
                } else {
                    showMessage('鍙栨秷淇濈暀澶辫触: ' + response.error, 'error');
                }
            } catch (error) {
                showMessage('鍙栨秷淇濈暀澶辫触: ' + error.message, 'error');
            }
        }

        async function loadHistory() {
            try {
                const response = await API.get('/api/system/check-links');
                if (response.success) {
                    displayHistory(response.data);
                }
            } catch (error) {
                console.error('鍔犺浇鍘嗗彶澶辫触:', error);
            }
        }

        function displayHistory(history) {
            const historyList = document.getElementById('historyList');
            
            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-state">鏆傛棤妫€鏌ュ巻鍙?/div>';
                return;
            }

            historyList.innerHTML = history.map(record => `
                <div class="history-item">
                    <div class="history-header">
                        <strong>${new Date(record.checkedAt).toLocaleString()}</strong>
                        <div class="history-stats">
                            <span>鎬昏: ${record.total}</span>
                            <span style="color: #28a745;">鍙闂? ${record.accessible}</span>
                            <span style="color: #dc3545;">涓嶅彲璁块棶: ${record.inaccessible}</span>
                            ${record.autoDelete ? `<span style="color: #ffc107;">宸插垹闄? ${record.inaccessible}</span>` : ''}
                        </div>
                    </div>
                    <div>
                        ${record.autoDelete ? '鉁?鑷姩鍒犻櫎宸插惎鐢? : '鈿狅笍 浠呮鏌ワ紝鏈垹闄?}
                    </div>
                </div>
            `).join('');
        }

        function toggleHistory() {
            const historyCard = document.getElementById('historyCard');
            historyCard.classList.toggle('hidden');
        }

        // 鍒囨崲璇存槑闈㈡澘
        function toggleExplanation() {
            const content = document.getElementById('explanationContent');
            const toggleText = document.getElementById('explanationToggleText');

            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                toggleText.textContent = '闅愯棌璇︽儏';
            } else {
                content.classList.add('hidden');
                toggleText.textContent = '鏄剧ず璇︽儏';
            }
        }

        // 绛涢€変功绛炬樉绀?
        function filterBookmarksDisplay(filter) {
            const bookmarkItems = document.querySelectorAll('.bookmark-item');
            let visibleCount = 0;

            bookmarkItems.forEach(item => {
                let shouldShow = false;

                switch (filter) {
                    case 'all':
                        shouldShow = true;
                        break;
                    case 'checked':
                        shouldShow = item.classList.contains('accessible') ||
                                   item.classList.contains('inaccessible') ||
                                   item.classList.contains('kept') ||
                                   item.classList.contains('deleted');
                        break;
                    case 'accessible':
                        shouldShow = item.classList.contains('accessible');
                        break;
                    case 'inaccessible':
                        shouldShow = item.classList.contains('inaccessible');
                        break;
                    case 'deleted':
                        shouldShow = item.classList.contains('deleted');
                        break;
                    case 'kept':
                        shouldShow = item.classList.contains('kept');
                        break;
                }

                if (shouldShow) {
                    item.style.display = 'flex';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            // 鏇存柊绛涢€夌姸鎬佹樉绀?
            const filterStatus = document.getElementById('filterStatus');
            if (filterStatus) {
                if (filter === 'all') {
                    filterStatus.textContent = `鏄剧ず鍏ㄩ儴 (${visibleCount})`;
                } else {
                    const filterNames = {
                        'checked': '宸叉鏌?,
                        'accessible': '鍙闂?,
                        'inaccessible': '涓嶅彲璁块棶',
                        'deleted': '宸插垹闄?,
                        'kept': '宸蹭繚鐣?
                    };
                    filterStatus.textContent = `绛涢€? ${filterNames[filter]} (${visibleCount})`;
                }
            }
        }
    </script>
