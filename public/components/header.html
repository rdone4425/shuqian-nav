<!-- Unified header component -->
<header class="header">
    <div class="header-content">
        <div class="logo">
            <span class="logo-icon" id="pageLogoIcon">B</span>
            <h1 class="logo-text" id="pageLogoText">书签导航</h1>
        </div>

        <div class="header-actions">
            <div class="action-group primary-actions">
                <button id="searchToggle" class="action-btn-icon" title="搜索书签">
                    <span class="btn-icon">S</span>
                </button>
                <button id="addBookmarkBtn" class="action-btn-icon primary hidden" title="添加书签">
                    <span class="btn-icon">+</span>
                </button>
            </div>

            <div class="action-group tools-menu">
                <button id="toolsMenuToggle" class="action-btn-icon menu-toggle" title="工具菜单">
                    <span class="btn-icon">...</span>
                    <span class="dropdown-arrow">v</span>
                </button>
                <div id="toolsDropdown" class="dropdown-menu">
                    <a href="/" class="dropdown-item">
                        <span class="item-icon">H</span>
                        <div class="item-content">
                            <span class="item-text">首页</span>
                            <span class="item-desc">返回书签首页</span>
                        </div>
                    </a>
                    <a href="/token.html" class="dropdown-item">
                        <span class="item-icon">API</span>
                        <div class="item-content">
                            <span class="item-text">API 令牌</span>
                            <span class="item-desc">管理访问令牌</span>
                        </div>
                    </a>
                    <a href="/link-checker.html" class="dropdown-item">
                        <span class="item-icon">CHK</span>
                        <div class="item-content">
                            <span class="item-text">链接检查</span>
                            <span class="item-desc">检查链接是否可访问</span>
                        </div>
                    </a>
                    <a href="/deleted-bookmarks.html" class="dropdown-item">
                        <span class="item-icon">DEL</span>
                        <div class="item-content">
                            <span class="item-text">删除记录</span>
                            <span class="item-desc">查看和恢复已删除书签</span>
                        </div>
                    </a>
                    <a href="/notifications.html" class="dropdown-item">
                        <span class="item-icon">MSG</span>
                        <div class="item-content">
                            <span class="item-text">通知中心</span>
                            <span class="item-desc">查看系统通知</span>
                        </div>
                    </a>
                    <a href="/import.html" class="dropdown-item">
                        <span class="item-icon">IMP</span>
                        <div class="item-content">
                            <span class="item-text">导入书签</span>
                            <span class="item-desc">从文件导入书签数据</span>
                        </div>
                    </a>
                    <a href="/ai-settings.html" class="dropdown-item">
                        <span class="item-icon">AI</span>
                        <div class="item-content">
                            <span class="item-text">AI 设置</span>
                            <span class="item-desc">管理 AI 接口与模型</span>
                        </div>
                    </a>
                    <div class="dropdown-divider"></div>
                    <button id="changePasswordBtn" class="dropdown-item">
                        <span class="item-icon">PWD</span>
                        <div class="item-content">
                            <span class="item-text">修改密码</span>
                            <span class="item-desc">更新管理员密码</span>
                        </div>
                    </button>
                    <button id="settingsToggle" class="dropdown-item">
                        <span class="item-icon">CFG</span>
                        <div class="item-content">
                            <span class="item-text">系统设置</span>
                            <span class="item-desc">打开设置面板</span>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
function setPageSpecificContent(icon, text) {
    const iconElement = document.getElementById('pageLogoIcon');
    const textElement = document.getElementById('pageLogoText');

    if (iconElement) {
        iconElement.textContent = icon;
    }

    if (textElement) {
        textElement.textContent = text;
    }
}

function initNavigation() {
    const toolsMenuToggle = document.getElementById('toolsMenuToggle');
    const toolsDropdown = document.getElementById('toolsDropdown');

    if (toolsMenuToggle && toolsDropdown) {
        toolsMenuToggle.addEventListener('click', (event) => {
            event.stopPropagation();
            toolsDropdown.classList.toggle('show');
        });

        document.addEventListener('click', (event) => {
            if (!toolsMenuToggle.contains(event.target) && !toolsDropdown.contains(event.target)) {
                toolsDropdown.classList.remove('show');
            }
        });
    }

    const searchToggle = document.getElementById('searchToggle');
    const searchContainer = document.getElementById('searchContainer');

    if (searchToggle && searchContainer) {
        searchToggle.addEventListener('click', () => {
            searchContainer.classList.toggle('hidden');
            if (!searchContainer.classList.contains('hidden')) {
                document.getElementById('searchInput')?.focus();
            }
        });
    }

    const settingsToggle = document.getElementById('settingsToggle');
    if (settingsToggle) {
        settingsToggle.addEventListener('click', () => {
            document.getElementById('settingsPanel')?.classList.toggle('hidden');
        });
    }

    const changePasswordBtn = document.getElementById('changePasswordBtn');
    if (changePasswordBtn) {
        changePasswordBtn.addEventListener('click', () => {
            document.getElementById('changePasswordModal')?.classList.remove('hidden');
        });
    }
}

document.addEventListener('DOMContentLoaded', initNavigation);
</script>
