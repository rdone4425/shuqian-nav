<!--
  Unified site header partial.
  Loaded at runtime by /js/shared/site-menu.js into any element marked with
  `data-site-header`. Attributes on that element provide the per-page
  identity (logo icon / title / subtitle / page key).
  This file is the single source of truth for the global navigation.
  Do NOT copy its content into individual HTML pages.
-->
<div class="header-content" data-site-header-shell>
  <a class="logo" href="/" aria-label="书签导航首页" data-site-header-logo>
    <span class="logo-icon" data-site-header-logo-icon>{{LOGO_ICON}}</span>
    <div class="logo-copy">
      <h1 class="logo-text" data-site-header-logo-text>{{LOGO_TEXT}}</h1>
      <p class="logo-subtitle" data-site-header-logo-subtitle>
        {{LOGO_SUBTITLE}}
      </p>
    </div>
  </a>

  <div class="header-actions" data-site-header-actions>
    <div class="action-group primary-actions" data-site-header-slot="primary">
      <!-- Pages may place a search/add control here by adding a child to the
           host element with data-site-header-primary. The injector will
           hoist it into this group so the visual rhythm is preserved. -->
    </div>

    <div class="action-group tools-menu">
      <button
        id="toolsMenuToggle"
        class="action-btn-icon menu-toggle has-label site-menu-toggle"
        title="打开菜单"
        aria-expanded="false"
        aria-controls="toolsDropdown"
        type="button"
      >
        <span class="btn-icon" aria-hidden="true">☰</span>
        <span class="action-btn-label">菜单</span>
      </button>
      <div
        id="toolsDropdown"
        class="dropdown-menu site-menu-dropdown"
        role="menu"
      ></div>
    </div>

    <button
      id="logoutBtn"
      class="action-btn-icon has-label site-logout-btn"
      type="button"
      title="登录后台"
    >
      <span class="btn-icon" aria-hidden="true">↗</span>
      <span class="action-btn-label">登录后台</span>
    </button>
  </div>
</div>
