<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Bookmark Navigator</title>
    <meta
      name="description"
      content="Administrator login for Bookmark Navigator"
    />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;590;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="logo">
            <span class="logo-icon">B</span>
            <h1 class="logo-text">Bookmark Navigator</h1>
          </div>
          <p class="login-subtitle">Enter the admin password to continue.</p>
          <p class="login-hint">
            First login: use <strong>admin123</strong>, then change it
            immediately after sign-in.
          </p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="password" class="form-label">
              <span class="label-icon">P</span>
              <span class="label-text">Password</span>
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="form-input"
              placeholder="Enter password"
              autocomplete="current-password"
            />
          </div>

          <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
            <span class="btn-icon">L</span>
            <span class="btn-text">Login</span>
          </button>
        </form>

        <div id="loginStatus" class="login-status hidden">
          <div class="status-icon">...</div>
          <div class="status-text">Verifying...</div>
        </div>

        <div id="errorMessage" class="error-message hidden">
          <div class="error-icon">!</div>
          <div class="error-text">Password is incorrect.</div>
        </div>
      </div>

      <div class="login-footer">
        <div class="footer-info">
          <p>Bookmark Navigator v1.0.0</p>
          <p>Cloudflare Pages + Functions + D1</p>
        </div>
        <div class="footer-links">
          <a
            href="/api/health"
            target="_blank"
            rel="noreferrer"
            class="footer-link"
            >Health Check</a
          >
        </div>
      </div>
    </div>

    <div class="login-background">
      <div class="bg-shape shape-1"></div>
      <div class="bg-shape shape-2"></div>
      <div class="bg-shape shape-3"></div>
    </div>

    <script src="/js/utils/storage.js"></script>
    <script src="/js/utils/api.js"></script>
    <script src="/js/auth.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const loginForm = document.getElementById("loginForm");
        const passwordInput = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const loginStatus = document.getElementById("loginStatus");
        const errorMessage = document.getElementById("errorMessage");

        await Auth.init();
        if (Auth.checkAuthenticated()) {
          window.location.href = "/";
          return;
        }

        loginForm.addEventListener("submit", async (event) => {
          event.preventDefault();

          const password = passwordInput.value.trim();
          if (!password) {
            showError("Please enter a password.");
            return;
          }

          try {
            showLoading();
            const result = await Auth.login(password);

            if (!result.success) {
              showError(result.error || "Login failed.");
              return;
            }

            showSuccess(
              result.isDefaultPassword
                ? "Login successful. Change the default password as soon as possible."
                : "Login successful. Redirecting...",
            );

            setTimeout(() => {
              Auth.redirectAfterLogin();
            }, 800);
          } catch (error) {
            console.error("Login failed:", error);
            showError(error.message || "Network error. Please try again.");
          }
        });

        function showLoading() {
          loginBtn.disabled = true;
          loginBtn.querySelector(".btn-text").textContent = "Logging in...";
          loginStatus.classList.remove("hidden");
          loginStatus.querySelector(".status-icon").textContent = "...";
          loginStatus.querySelector(".status-text").textContent =
            "Verifying...";
          errorMessage.classList.add("hidden");
        }

        function showError(message) {
          loginBtn.disabled = false;
          loginBtn.querySelector(".btn-text").textContent = "Login";
          loginStatus.classList.add("hidden");
          errorMessage.querySelector(".error-text").textContent = message;
          errorMessage.classList.remove("hidden");
          passwordInput.focus();
          passwordInput.select();
        }

        function showSuccess(message) {
          loginBtn.disabled = false;
          loginBtn.querySelector(".btn-text").textContent = "Login";
          loginStatus.classList.remove("hidden");
          loginStatus.querySelector(".status-icon").textContent = "OK";
          loginStatus.querySelector(".status-text").textContent = message;
          errorMessage.classList.add("hidden");
        }

        passwordInput.focus();
      });
    </script>
  </body>
</html>
