<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 书签导航</title>
    <meta name="description" content="登录后管理和访问你的书签导航。" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="/css/workspace-refresh.css?v=nav-20260602-public-home"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site login-page">
    <main class="login-container">
      <section class="login-card">
        <div class="login-header">
          <div class="logo login-logo">
            <span class="logo-icon">N</span>
            <div class="logo-copy">
              <h1 class="logo-text">书签导航</h1>
              <p class="logo-subtitle">登录后进入你的导航书签</p>
            </div>
          </div>
          <p class="login-subtitle">
            这里保存的是你的真实书签数据，不再展示硬编码示例站点。
          </p>
        </div>

        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="password">管理员密码</label>
            <input
              id="password"
              class="form-input"
              type="password"
              autocomplete="current-password"
              required
              autofocus
            />
          </div>
          <button
            id="loginButton"
            class="btn btn-primary btn-full"
            type="submit"
          >
            登录
          </button>
          <p id="loginMessage" class="login-hint" role="status"></p>
        </form>
      </section>
    </main>

    <script src="/js/shared/auth.js?v=nav-20260602-auth-cache"></script>
    <script src="/js/login.js?v=nav-20260603-login-feedback"></script>
  </body>
</html>
