<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书签管理 - 书签导航</title>
    <meta name="description" content="搜索、筛选和批量移动已有书签。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="/css/workspace-refresh.css?v=nav-20260602-public-home"
    />
    <link rel="stylesheet" href="/css/tokens.css?v=nav-20260603-tokens" />
    <link
      rel="stylesheet"
      href="/css/components.css?v=nav-20260603-components"
    />
    <link rel="stylesheet" href="/css/admin.css?v=nav-20260603-admin-layout" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site admin-site">
    <div class="container">
      <div
        data-site-header
        data-page-key="bookmarks-manage"
        class="header"
      ></div>

      <section class="workspace-section-heading">
        <div>
          <span class="section-kicker">管理</span>
          <h2 class="section-title">新增书签，或搜索筛选后批量整理</h2>
        </div>
        <div class="section-action-stack">
          <p class="section-copy">
            在顶部表单里直接添加书签；下方列表支持搜索、筛选、批量移动与删除。
          </p>
        </div>
      </section>

      <main class="management-shell">
        <section class="management-panel">
          <form id="createBookmarkForm" class="management-form">
            <div class="management-form-heading">
              <div>
                <span class="section-kicker">新增书签</span>
                <h3>手动添加一条书签</h3>
              </div>
              <p>标题和 URL 必填，创建后会出现在首页和下方列表里。</p>
            </div>
            <div class="management-fields">
              <label class="field-stack grow">
                <span>标题</span>
                <input
                  id="createBookmarkTitle"
                  class="management-input"
                  type="text"
                  required
                />
              </label>
              <label class="field-stack grow">
                <span>URL</span>
                <input
                  id="createBookmarkUrl"
                  class="management-input"
                  type="url"
                  required
                />
              </label>
              <label class="field-stack grow">
                <span>描述</span>
                <input
                  id="createBookmarkDescription"
                  class="management-input"
                  type="text"
                />
              </label>
              <label class="field-stack">
                <span>分类</span>
                <select
                  id="createBookmarkCategory"
                  class="management-select"
                ></select>
              </label>
              <button
                id="saveCreateBookmarkBtn"
                class="btn btn-primary"
                type="submit"
              >
                创建书签
              </button>
              <button
                id="resetCreateBookmarkBtn"
                class="btn btn-secondary"
                type="button"
              >
                清空
              </button>
            </div>
          </form>

          <div class="management-toolbar">
            <div class="management-fields">
              <label class="field-stack grow">
                <span>搜索</span>
                <input
                  id="bookmarkSearch"
                  class="management-input"
                  type="search"
                  placeholder="标题、描述或 URL"
                />
              </label>
              <label class="field-stack">
                <span>分类筛选</span>
                <select
                  id="bookmarkCategoryFilter"
                  class="management-select"
                ></select>
              </label>
              <button
                id="refreshBookmarksBtn"
                class="btn btn-secondary"
                type="button"
              >
                刷新
              </button>
            </div>
            <div class="management-actions">
              <span id="selectedBookmarkCount" class="selection-note"
                >已选择 0 条</span
              >
              <select id="bulkMoveCategory" class="management-select"></select>
              <button
                id="bulkMoveBtn"
                class="btn btn-primary"
                type="button"
                disabled
              >
                批量移动
              </button>
              <button
                id="bulkDeleteBtn"
                class="btn btn-danger"
                type="button"
                disabled
              >
                批量删除
              </button>
            </div>
          </div>

          <div class="management-table-wrap">
            <table class="management-table">
              <thead>
                <tr>
                  <th><input id="selectAllBookmarks" type="checkbox" /></th>
                  <th>书签</th>
                  <th>当前分类</th>
                  <th>移动到</th>
                  <th>更新时间</th>
                </tr>
              </thead>
              <tbody id="bookmarksManageBody">
                <tr>
                  <td colspan="5" class="management-empty">正在加载书签...</td>
                </tr>
              </tbody>
            </table>
            <div id="bookmarkPagination" class="management-pagination"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/shared/api.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/auth.js?v=nav-20260602-auth-cache"></script>
    <script src="/js/shared/site-menu.js?v=nav-20260603-logout-icon"></script>
    <script src="/js/shared/admin-common.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/admin-shell.js?v=nav-20260603-admin-shell"></script>
    <script src="/js/admin/bookmark-manager-page.js?v=nav-20260602-public-home"></script>
  </body>
</html>
