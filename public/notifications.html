<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>通知 - 书签导航</title>
    <meta
      name="description"
      content="查看最近的维护通知、检查结果和系统记录。"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="/css/workspace-refresh.css?v=nav-20260602-public-home"
    />
    <link
      rel="stylesheet"
      href="/css/notifications-enhanced.css?v=nav-20260602-shell"
    />
    <link rel="stylesheet" href="/css/admin.css?v=nav-20260603-admin-shell" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site admin-site">
    <div class="container">
      <div
        data-site-header
        data-page-key="notifications"
        data-logo-icon="MSG"
        data-logo-text="通知"
        data-logo-subtitle="查看最近的维护摘要和系统提醒"
        class="header"
      ></div>

      <section class="workspace-section-heading">
        <div>
          <span class="section-kicker">通知</span>
          <h2 class="section-title">让维护结果保持可见，而不是静默发生</h2>
        </div>
        <p class="section-copy">
          链接检查、定时维护和系统提示，都应该留下清晰记录，方便你回看和判断。
        </p>
      </section>

      <main class="notifications-container">
        <section class="notification-card">
          <div class="notification-card-header">
            <h2 class="notification-card-title">摘要</h2>
            <button id="refreshBtn" class="btn btn-secondary" type="button">
              刷新
            </button>
          </div>
          <div class="notification-stats">
            <div class="stat-group">
              <span class="stat-icon">ALL</span>
              <span class="stat-text">总记录数</span>
              <span id="totalChecks" class="stat-value">0</span>
            </div>
            <div class="stat-group">
              <span class="stat-icon">BAD</span>
              <span class="stat-text">不可访问总数</span>
              <span id="totalInaccessible" class="stat-value">0</span>
            </div>
            <div class="stat-group">
              <span class="stat-icon">VIEW</span>
              <span class="stat-text">当前显示</span>
              <span id="visibleNotifications" class="stat-value">0</span>
            </div>
            <div class="stat-group">
              <span class="stat-icon">TIME</span>
              <span class="stat-text">最近检查</span>
              <span id="lastCheckTime" class="stat-value">-</span>
            </div>
          </div>
        </section>

        <section class="notification-card">
          <div class="notification-card-header">
            <div>
              <h2 class="notification-card-title">最近记录</h2>
              <p id="filterStatus" class="notification-filter-status">
                显示全部维护记录
              </p>
            </div>
            <label class="notification-filter-control">
              <span>筛选</span>
              <select id="notificationFilter" class="filter-select">
                <option value="all">全部记录</option>
                <option value="issues">只看异常</option>
                <option value="clean">无异常记录</option>
                <option value="weekly_auto_check">自动检查</option>
                <option value="weekly_check_notification">自动通知</option>
              </select>
            </label>
          </div>
          <div id="notificationsList">
            <div class="notification-description">正在加载通知记录...</div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/shared/api.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/auth.js?v=nav-20260602-auth-cache"></script>
    <script src="/js/shared/site-menu.js?v=nav-20260603-logout-icon"></script>
    <script src="/js/shared/admin-common.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/admin-shell.js?v=nav-20260603-admin-shell"></script>
    <script src="/js/admin/notifications-page.js?v=nav-20260602-admin-runtime"></script>
  </body>
</html>
