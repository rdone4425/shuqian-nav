<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>已删除书签 - 书签导航</title>
    <meta
      name="description"
      content="查看已删除书签记录，并在需要时恢复误删内容。"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/workspace-refresh.css" />
    <link rel="stylesheet" href="/css/deleted-bookmarks-enhanced.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site">
    <div class="container">
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <span class="logo-icon">DEL</span>
            <div class="logo-copy">
              <h1 class="logo-text">已删除书签</h1>
              <p class="logo-subtitle">查看删除记录，并在需要时恢复书签</p>
            </div>
          </div>
          <div class="header-actions">
            <a class="action-btn-icon has-label" href="/">
              <span class="btn-icon">H</span>
              <span class="action-btn-label">首页</span>
            </a>
          </div>
        </div>
      </header>

      <section class="workspace-section-heading">
        <div>
          <span class="section-kicker">恢复</span>
          <h2 class="section-title">让删除历史可见，也能及时撤回误删</h2>
        </div>
        <p class="section-copy">
          这个页面就是清理工作的安全网。误删、失效链接删除或批量处理后的记录，都可以在这里回看。
        </p>
      </section>

      <main class="main-content">
        <section class="stats-section">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="totalDeleted">0</div>
              <div class="stat-label">当前记录</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="manualDeleted">0</div>
              <div class="stat-label">手动删除</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="autoDeleted">0</div>
              <div class="stat-label">维护删除</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="todayDeleted">0</div>
              <div class="stat-label">今日删除</div>
            </div>
          </div>
        </section>

        <section class="actions-section">
          <div class="actions-left">
            <button id="refreshBtn" class="btn btn-primary" type="button">
              刷新列表
            </button>
            <label class="bulk-select-inline">
              <input id="selectAllRecords" type="checkbox" />
              <span>全选本页</span>
            </label>
            <span id="selectedCount" class="selected-count">已选择 0 条</span>
            <button
              id="batchRestoreBtn"
              class="btn btn-secondary"
              type="button"
              disabled
            >
              批量恢复
            </button>
            <button
              id="batchDeleteBtn"
              class="btn btn-danger"
              type="button"
              disabled
            >
              批量永久删除
            </button>
          </div>
          <div class="actions-right">
            <select id="filterSelect" class="filter-select">
              <option value="all">全部记录</option>
              <option value="manual_delete">手动删除</option>
              <option value="link_check_failed">链接检查失败</option>
              <option value="batch_delete_inaccessible">批量删除</option>
            </select>
            <input
              type="search"
              id="searchInput"
              placeholder="搜索标题或 URL"
              class="search-input"
            />
          </div>
        </section>

        <section class="records-section">
          <div id="recordsList" class="records-list">
            <div class="loading">正在加载已删除书签...</div>
          </div>
          <div id="pagination" class="pagination hidden">
            <button id="prevPage" class="btn btn-secondary" type="button">
              上一页
            </button>
            <span id="pageInfo" class="page-info">第 1 页，共 1 页</span>
            <button id="nextPage" class="btn btn-secondary" type="button">
              下一页
            </button>
          </div>
        </section>
      </main>
    </div>

    <div id="restoreModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>恢复书签</h3>
          <button id="closeRestoreModal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="restoreBookmarkInfo"></div>
          <p>确定立即恢复这条书签吗？</p>
          <div class="modal-actions">
            <button id="cancelRestore" class="btn btn-secondary" type="button">
              取消
            </button>
            <button id="confirmRestore" class="btn btn-primary" type="button">
              恢复
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="detailModal" class="modal hidden">
      <div class="modal-content modal-large">
        <div class="modal-header">
          <h3>删除详情</h3>
          <button id="closeDetailModal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="bookmarkDetails"></div>
        </div>
      </div>
    </div>

    <script src="/js/utils/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/site-menu.js"></script>
    <script src="/js/admin-common.js"></script>
    <script src="/js/deleted-bookmarks.js?v=20260531-batch"></script>
  </body>
</html>
