<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>已删除书签 - 书签导航</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;590;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/deleted-bookmarks-enhanced.css" />
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <span class="logo-icon">DEL</span>
            <h1 class="logo-text" data-i18n="deleted.title">已删除书签</h1>
          </div>
          <div class="header-actions">
            <div class="action-group tools-menu">
              <button id="toolsMenuToggle" class="action-btn-icon menu-toggle" title="Tools menu">
                <span class="btn-icon">...</span>
                <span class="dropdown-arrow">v</span>
              </button>
              <div id="toolsDropdown" class="dropdown-menu">
                <a href="/" class="dropdown-item"><span class="item-icon">H</span><div class="item-content"><span class="item-text">首页</span><span class="item-desc">返回主书签页</span></div></a>
                <a href="/token.html" class="dropdown-item"><span class="item-icon">API</span><div class="item-content"><span class="item-text" data-i18n="header.apiTokens">API 令牌</span><span class="item-desc" data-i18n="header.apiTokensDesc">管理访问令牌</span></div></a>
                <a href="/link-checker.html" class="dropdown-item"><span class="item-icon">CHK</span><div class="item-content"><span class="item-text" data-i18n="header.linkChecker">链接检查</span><span class="item-desc" data-i18n="header.linkCheckerDesc">检查书签可访问性</span></div></a>
                <a href="/notifications.html" class="dropdown-item"><span class="item-icon">MSG</span><div class="item-content"><span class="item-text" data-i18n="header.notifications">通知</span><span class="item-desc" data-i18n="header.notificationsDesc">查看最近通知</span></div></a>
                <a href="/import.html" class="dropdown-item"><span class="item-icon">IMP</span><div class="item-content"><span class="item-text">导入</span><span class="item-desc">从文件导入书签</span></div></a>
                <a href="/ai-settings.html" class="dropdown-item"><span class="item-icon">AI</span><div class="item-content"><span class="item-text" data-i18n="header.aiSettings">AI 设置</span><span class="item-desc" data-i18n="header.aiSettingsDesc">管理 AI 端点和模型</span></div></a>
                <div class="dropdown-divider"></div>
                <button id="changePasswordBtn" class="dropdown-item"><span class="item-icon">PWD</span><div class="item-content"><span class="item-text" data-i18n="header.changePassword">修改密码</span><span class="item-desc" data-i18n="header.changePasswordDesc">返回密码修改流程</span></div></button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <section class="stats-section">
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="totalDeleted">0</div><div class="stat-label">Visible records</div></div>
            <div class="stat-card"><div class="stat-value" id="manualDeleted">0</div><div class="stat-label">Manual delete</div></div>
            <div class="stat-card"><div class="stat-value" id="autoDeleted">0</div><div class="stat-label">Failed link delete</div></div>
            <div class="stat-card"><div class="stat-value" id="todayDeleted">0</div><div class="stat-label">Deleted today</div></div>
          </div>
        </section>

        <section class="actions-section">
          <div class="actions-left">
            <button id="refreshBtn" class="btn btn-primary">Refresh list</button>
            <button id="clearAllBtn" class="btn btn-danger" type="button" disabled>Bulk clear not supported</button>
          </div>
          <div class="actions-right">
            <select id="filterSelect" class="filter-select">
              <option value="all">All records</option>
              <option value="manual_delete">Manual delete</option>
              <option value="link_check_failed">Link check failed</option>
              <option value="batch_delete_inaccessible">Batch delete</option>
            </select>
            <input type="search" id="searchInput" placeholder="搜索标题或 URL" class="search-input" />
          </div>
        </section>

        <section class="records-section">
          <div id="recordsList" class="records-list">
            <div class="loading">Loading deleted bookmarks...</div>
          </div>
          <div id="pagination" class="pagination hidden">
            <button id="prevPage" class="btn btn-secondary">Previous</button>
            <span id="pageInfo" class="page-info">Page 1 of 1</span>
            <button id="nextPage" class="btn btn-secondary">Next</button>
          </div>
        </section>
      </main>
    </div>

    <div id="restoreModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>恢复 bookmark</h3>
          <button id="close恢复Modal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="restoreBookmarkInfo"></div>
          <p>恢复 this bookmark now?</p>
          <div class="modal-actions">
            <button id="cancel恢复" class="btn btn-secondary">Cancel</button>
            <button id="confirm恢复" class="btn btn-primary">恢复</button>
          </div>
        </div>
      </div>
    </div>

    <div id="detailModal" class="modal hidden">
      <div class="modal-content modal-large">
        <div class="modal-header">
          <h3>Delete details</h3>
          <button id="closeDetailModal" class="btn-close">&times;</button>
        </div>
        <div class="modal-body">
          <div id="bookmarkDetails"></div>
        </div>
      </div>
    </div>

    <script src="/js/utils/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/admin-common.js"></script>
    <script src="/js/deleted-bookmarks.js"></script>
      <script src="/js/i18n.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => { if (window.I18n) I18n.init(); });
    </script>
  </body>
</html>
