<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台首页 - 书签导航</title>
    <meta
      name="description"
      content="查看书签导航后台的关键摘要和快捷入口。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="/css/workspace-refresh.css?v=nav-20260603-admin-shell"
    />
    <link rel="stylesheet" href="/css/admin.css?v=nav-20260603-admin-layout" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site admin-site">
    <div class="container">
      <div
        data-site-header
        data-page-key="admin-dashboard"
        data-logo-icon="ADM"
        data-logo-text="后台管理"
        data-logo-subtitle="书签、分类和系统维护"
        class="header"
      ></div>

      <section class="workspace-section-heading admin-page-heading">
        <div>
          <span class="section-kicker">概览</span>
          <h2 class="section-title">统一管理入口</h2>
        </div>
        <p class="section-copy">
          管理书签内容、分类结构、导入备份和链接维护。首页保留公开导航，后台负责所有新增、编辑、删除和系统工具。
        </p>
      </section>

      <main class="admin-dashboard-grid">
        <section class="admin-dashboard-metrics" aria-label="后台摘要">
          <article class="admin-dashboard-card metric-card metric-card-primary">
            <span>书签总数</span>
            <strong id="dashboardBookmarkTotal">-</strong>
          </article>
          <article class="admin-dashboard-card metric-card">
            <span>分类总数</span>
            <strong id="dashboardCategoryTotal">-</strong>
          </article>
          <article class="admin-dashboard-card metric-card">
            <span>当前显示</span>
            <strong id="dashboardVisibleTotal">-</strong>
          </article>
          <article class="admin-dashboard-card metric-card">
            <span>最近访问记录</span>
            <strong id="dashboardVisitedTotal">-</strong>
          </article>
        </section>

        <section class="admin-dashboard-actions" aria-label="快捷操作">
          <a
            class="admin-dashboard-action"
            href="/bookmarks-manage.html?new=bookmark"
          >
            <span class="admin-action-icon">+</span>
            <strong>新增书签</strong>
            <span>进入书签管理页添加站点。</span>
          </a>
          <a class="admin-dashboard-action" href="/categories.html?create=1">
            <span class="admin-action-icon">#</span>
            <strong>新建分类</strong>
            <span>维护分类名称、颜色和归属。</span>
          </a>
          <a class="admin-dashboard-action" href="/import.html">
            <span class="admin-action-icon">↥</span>
            <strong>导入书签</strong>
            <span>先预览，再合并或替换导入。</span>
          </a>
          <a class="admin-dashboard-action" href="/link-checker.html">
            <span class="admin-action-icon">✓</span>
            <strong>链接检查</strong>
            <span>检查可访问性后再清理异常项。</span>
          </a>
        </section>

        <section class="admin-dashboard-lists">
          <article class="admin-dashboard-card admin-dashboard-list">
            <div class="admin-card-heading">
              <h3>最近收录</h3>
              <a href="/bookmarks-manage.html">查看全部</a>
            </div>
            <div id="dashboardRecentBookmarks">
              <p>正在加载最近书签...</p>
            </div>
          </article>
          <article class="admin-dashboard-card admin-dashboard-list">
            <div class="admin-card-heading">
              <h3>分类概况</h3>
              <a href="/categories.html">管理分类</a>
            </div>
            <div id="dashboardCategories">
              <p>正在加载分类...</p>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script src="/js/shared/api.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/auth.js?v=nav-20260602-auth-cache"></script>
    <script src="/js/shared/site-menu.js?v=nav-20260603-logout-icon"></script>
    <script src="/js/shared/admin-common.js?v=nav-20260602-shared-runtime"></script>
    <script src="/js/shared/admin-shell.js?v=nav-20260603-admin-shell"></script>
    <script src="/js/admin/admin-dashboard.js?v=nav-20260603-admin-shell"></script>
  </body>
</html>
