<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="common.appName">书签导航</title>
    <meta
      name="description"
      content="一个面向日常访问的导航网站，支持搜索、分类浏览、菜单工具和书签维护。"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link
      rel="stylesheet"
      href="/css/workspace-refresh.css?v=nav-20260601-ui-refresh"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  </head>
  <body class="nav-site">
    <div class="container nav-shell">
      <div
        data-site-header
        data-page-key="home"
        data-require-auth="false"
        data-logo-icon="N"
        data-logo-text="书签导航"
        data-logo-subtitle="你的常用站点入口"
        class="header nav-header"
      >
        <button
          id="searchToggle"
          class="action-btn-icon has-label primary"
          title="聚焦搜索"
          data-i18n-title="header.searchTitle"
          data-site-header-primary
        >
          <span class="btn-icon">⌕</span>
          <span class="action-btn-label" data-i18n="header.searchButton"
            >搜索</span
          >
        </button>
        <button
          id="addBookmarkBtn"
          class="action-btn-icon has-label"
          title="添加站点"
          data-i18n-title="header.addTitle"
          data-site-header-primary
        >
          <span class="btn-icon">+</span>
          <span class="action-btn-label" data-i18n="header.addButton"
            >新增站点</span
          >
        </button>
      </div>

      <main class="main-content home-content nav-home">
        <section class="nav-toolbar" aria-label="搜索、筛选和统计">
          <div
            id="searchContainer"
            class="search-container nav-search-container"
          >
            <div class="search-box nav-search-box">
              <input
                type="text"
                id="searchInput"
                placeholder="搜索标题、描述、网址..."
                data-i18n-placeholder="search.placeholder"
                class="search-input"
              />
              <button
                id="searchBtn"
                class="search-btn"
                data-i18n="search.action"
              >
                搜索
              </button>
              <button
                id="clearSearchBtn"
                class="search-btn clear-btn"
                data-i18n="common.clear"
              >
                清除
              </button>
            </div>
          </div>

          <div class="nav-filter-row">
            <label class="filter-group">
              <span class="filter-label" data-i18n="filter.categoryLabel"
                >分类</span
              >
              <select id="categoryFilter" class="filter-select">
                <option value="" data-i18n="filter.allCategories">
                  全部分类
                </option>
              </select>
            </label>
            <label class="filter-group">
              <span class="filter-label" data-i18n="filter.sortLabel"
                >排序</span
              >
              <select id="sortSelect" class="filter-select">
                <option value="created_at:desc" data-i18n="filter.newest">
                  最新收录
                </option>
                <option value="popularity:desc" data-i18n="filter.popular">
                  最常用
                </option>
                <option value="visit_count:desc" data-i18n="filter.mostVisited">
                  访问最多
                </option>
                <option
                  value="last_visited:desc"
                  data-i18n="filter.recentVisited"
                >
                  最近访问
                </option>
                <option value="title:asc" data-i18n="filter.titleAZ">
                  标题 A-Z
                </option>
                <option value="title:desc" data-i18n="filter.titleZA">
                  标题 Z-A
                </option>
                <option
                  value="updated_at:desc"
                  data-i18n="filter.recentUpdated"
                >
                  最近更新
                </option>
                <option value="created_at:asc" data-i18n="filter.oldest">
                  最早收录
                </option>
              </select>
            </label>
            <div class="view-controls" role="group" aria-label="视图切换">
              <button
                id="gridViewBtn"
                class="view-btn active"
                title="网格视图"
                data-i18n-title="filter.gridView"
              >
                <span class="icon">▦</span>
                <span class="view-label" data-i18n="filter.gridShort"
                  >网格</span
                >
              </button>
              <button
                id="listViewBtn"
                class="view-btn"
                title="列表视图"
                data-i18n-title="filter.listView"
              >
                <span class="icon">☷</span>
                <span class="view-label" data-i18n="filter.listShort"
                  >列表</span
                >
              </button>
            </div>
          </div>

          <div class="stats-bar nav-stats">
            <div class="stats-item">
              <span class="stats-label" data-i18n="stats.total">站点总数</span>
              <span id="totalCount" class="stats-value">6</span>
            </div>
            <div class="stats-item">
              <span class="stats-label" data-i18n="stats.currentPage"
                >当前范围</span
              >
              <span id="currentPageInfo" class="stats-value">1-6</span>
            </div>
          </div>
        </section>

        <nav
          id="categoryRail"
          class="category-rail"
          aria-label="分类快速筛选"
        ></nav>

        <section
          id="directory"
          class="nav-directory"
          aria-labelledby="directoryTitle"
        >
          <div class="nav-directory-title">
            <p class="nav-kicker" data-i18n="home.bookmarksKicker">导航目录</p>
            <h2 id="directoryTitle" data-i18n="home.bookmarksTitle">
              常用站点
            </h2>
            <p data-i18n="home.bookmarksCopy">
              按当前分类和排序展示，点击网址直接访问，也可以编辑或删除。
            </p>
          </div>
          <div
            id="bookmarksGrid"
            class="bookmarks-grid nav-bookmarks-grid"
          ></div>
        </section>

        <div id="loadingState" class="loading-state hidden">
          <div class="loading-spinner"></div>
          <p data-i18n="common.loading">加载中...</p>
        </div>
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-icon">+</div>
          <h3 data-i18n="empty.noBookmarks">还没有站点</h3>
          <p data-i18n="empty.noBookmarksHint">
            点击顶部“新增站点”按钮添加第一个导航链接。
          </p>
        </div>
        <div id="errorState" class="error-state hidden">
          <div class="error-icon">!</div>
          <h3 data-i18n="common.loadFailed">加载失败</h3>
          <p id="errorMessage" data-i18n="home.loadFailedMessage">
            站点目录加载失败。
          </p>
          <button
            id="retryBtn"
            class="btn btn-primary"
            data-i18n="common.retry"
          >
            重试
          </button>
        </div>
        <div
          id="paginationContainer"
          class="pagination-container hidden"
          aria-hidden="true"
        >
          <div class="pagination">
            <button id="prevPageBtn" class="pagination-btn" disabled>
              <span class="icon">&lt;</span>
              <span data-i18n="pagination.prev">上一页</span>
            </button>
            <div id="pageNumbers" class="page-numbers"></div>
            <button id="nextPageBtn" class="pagination-btn" disabled>
              <span data-i18n="pagination.next">下一页</span>
              <span class="icon">&gt;</span>
            </button>
          </div>
        </div>
      </main>
    </div>

    <div id="bookmarkModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle" data-i18n="bookmarkModal.addTitle">添加站点</h3>
          <button id="closeModalBtn" class="btn-close" aria-label="关闭">
            ×
          </button>
        </div>
        <form id="bookmarkForm" class="modal-body">
          <div class="form-group">
            <label for="bookmarkTitle" data-i18n="bookmarkModal.title"
              >标题 *</label
            >
            <input type="text" id="bookmarkTitle" required class="form-input" />
          </div>
          <div class="form-group">
            <label for="bookmarkUrl" data-i18n="bookmarkModal.url">URL *</label>
            <input type="url" id="bookmarkUrl" required class="form-input" />
          </div>
          <div class="form-group">
            <label
              for="bookmarkDescription"
              data-i18n="bookmarkModal.description"
              >描述</label
            >
            <textarea
              id="bookmarkDescription"
              placeholder="可选的描述..."
              data-i18n-placeholder="bookmarkModal.descriptionPlaceholder"
              class="form-textarea"
              rows="3"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="bookmarkCategory" data-i18n="bookmarkModal.category"
              >分类</label
            >
            <div class="category-select-row">
              <select id="bookmarkCategory" class="form-select">
                <option value="" data-i18n="bookmarkModal.noCategory">
                  无分类
                </option>
              </select>
              <button
                id="quickCreateCategoryBtn"
                class="btn btn-secondary quick-category-btn"
                type="button"
              >
                新建
              </button>
            </div>
            <div id="quickCategoryForm" class="quick-category-form hidden">
              <input
                id="quickCategoryName"
                class="form-input"
                type="text"
                maxlength="60"
                placeholder="输入新分类名称"
              />
              <input
                id="quickCategoryColor"
                class="form-input quick-category-color"
                type="color"
                value="#3B82F6"
                aria-label="分类颜色"
              />
              <button
                id="confirmQuickCategoryBtn"
                class="btn btn-primary"
                type="button"
              >
                创建
              </button>
              <button
                id="cancelQuickCategoryBtn"
                class="btn btn-secondary"
                type="button"
              >
                取消
              </button>
            </div>
          </div>
          <div class="modal-actions">
            <button
              type="button"
              id="cancelBtn"
              class="btn btn-secondary"
              data-i18n="bookmarkModal.cancelBtn"
            >
              取消
            </button>
            <button
              type="submit"
              id="saveBtn"
              class="btn btn-primary"
              data-i18n="bookmarkModal.saveBtn"
            >
              保存
            </button>
          </div>
        </form>
      </div>
    </div>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="panel-header">
        <h3 data-i18n="settings.title">设置</h3>
        <button id="settingsClose" class="btn-close" aria-label="关闭">
          ×
        </button>
      </div>
      <div class="panel-content">
        <div class="settings-section">
          <h4 data-i18n="settings.data">数据</h4>
          <div class="export-buttons">
            <button
              id="exportBtn"
              class="btn btn-outline"
              data-i18n="settings.exportHtml"
            >
              导出 HTML
            </button>
            <button
              id="exportJSONBtn"
              class="btn btn-outline"
              data-i18n="settings.exportJson"
            >
              导出 JSON
            </button>
          </div>
          <div class="backup-buttons">
            <button
              id="fullBackupJSONBtn"
              class="btn btn-primary"
              data-i18n="settings.backupJson"
            >
              完整备份 (JSON)
            </button>
            <button
              id="fullBackupHTMLBtn"
              class="btn btn-primary"
              data-i18n="settings.backupHtml"
            >
              完整备份 (HTML)
            </button>
          </div>
          <button
            id="importBtn"
            class="btn btn-outline"
            data-i18n="settings.import"
          >
            导入书签
          </button>
        </div>
        <div class="settings-section">
          <h4>安全</h4>
          <form id="changePasswordForm" class="settings-form">
            <div class="form-group">
              <label for="currentPassword">当前密码</label>
              <input
                type="password"
                id="currentPassword"
                class="form-input"
                autocomplete="current-password"
                required
              />
            </div>
            <div class="form-group">
              <label for="newPassword">新密码</label>
              <input
                type="password"
                id="newPassword"
                class="form-input"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>
            <div class="form-group">
              <label for="confirmPassword">确认新密码</label>
              <input
                type="password"
                id="confirmPassword"
                class="form-input"
                autocomplete="new-password"
                minlength="6"
                required
              />
            </div>
            <button
              id="changePasswordBtn"
              type="submit"
              class="btn btn-primary"
            >
              修改密码
            </button>
          </form>
        </div>
        <div class="settings-section settings-note">
          <p data-i18n="home.settingsNote">
            导入、检查、恢复和备份集中放在菜单与设置里。
          </p>
        </div>
      </div>
    </div>

    <div id="messageContainer" class="message-container hidden">
      <div id="messageText" class="message-text"></div>
    </div>

    <script src="/js/i18n.js?v=nav-20260531-card-i18n"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/utils/storage.js"></script>
    <script src="/js/utils/api.js"></script>
    <script src="/js/utils/sorting.js"></script>
    <script src="/js/utils/dom-helper.js?v=nav-20260529"></script>
    <script src="/js/utils/ui-helper.js"></script>
    <script src="/js/bookmarks.js?v=nav-20260601-public-home"></script>
    <script src="/js/ui-enhancements.js?v=nav-20260529-ui3"></script>
    <script src="/js/site-menu.js?v=nav-20260601-public-home"></script>
    <script src="/js/app.js?v=nav-20260601-public-home"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.I18n) {
          I18n.init();
        }
      });
    </script>
  </body>
</html>
