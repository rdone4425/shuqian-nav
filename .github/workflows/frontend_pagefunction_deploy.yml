name: Deploy Pages App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PAGES_PROJECT_NAME: bookmark-navigator-pages
  D1_DATABASE_NAME: bookmark-navigator
  D1_BINDING_NAME: BOOKMARKS_DB
  PAGES_PRODUCTION_BRANCH: main
  COMPATIBILITY_DATE: "2026-04-07"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Pages deployment dependencies
        run: npm --prefix pages install

      - name: Ensure Pages project and D1 database
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          node <<'EOF'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID;
          const token = process.env.CLOUDFLARE_API_TOKEN;
          const projectName = process.env.PAGES_PROJECT_NAME;
          const databaseName = process.env.D1_DATABASE_NAME;
          const bindingName = process.env.D1_BINDING_NAME;
          const productionBranch = process.env.PAGES_PRODUCTION_BRANCH;
          const compatibilityDate = process.env.COMPATIBILITY_DATE;

          if (!accountId || !token) {
            throw new Error('Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN.');
          }

          if (!/^[a-f0-9]{32}$/i.test(accountId)) {
            throw new Error(
              'CLOUDFLARE_ACCOUNT_ID is not a valid 32-character account id. ' +
              'Check the GitHub secret value.'
            );
          }

          async function verifyToken() {
            const response = await fetch('https://api.cloudflare.com/client/v4/user/tokens/verify', {
              method: 'GET',
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json'
              }
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok || data.success === false) {
              throw new Error(
                'Cloudflare token verification failed. ' +
                'Make sure CLOUDFLARE_API_TOKEN is an API Token, not a Global API Key, ' +
                'and that the token is active. ' +
                `Response (${response.status}): ${JSON.stringify(data)}`
              );
            }

            console.log(`Verified Cloudflare API token ${data.result?.id || '(token id unavailable)'}`);
          }

          async function request(method, path, body, { allow404 = false } = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4/accounts/${accountId}${path}`, {
              method,
              headers: {
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: body ? JSON.stringify(body) : undefined
            });

            const data = await response.json().catch(() => ({}));

            if (allow404 && response.status === 404) {
              return { found: false, response, data };
            }

            if (!response.ok || data.success === false) {
              throw new Error(
                `Cloudflare API ${method} ${path} failed (${response.status}): ${JSON.stringify(data)}`
              );
            }

            return { found: true, response, data };
          }

          async function ensureD1Database() {
            let page = 1;

            while (true) {
              const { data } = await request('GET', `/d1/database?per_page=100&page=${page}`);
              const existing = (data.result || []).find((item) => item.name === databaseName);

              if (existing) {
                const id = existing.uuid || existing.id;
                console.log(`Reusing D1 database ${databaseName} (${id})`);
                return id;
              }

              const resultInfo = data.result_info || {};
              const totalPages = Number(resultInfo.total_pages || 1);
              if (page >= totalPages) {
                break;
              }

              page += 1;
            }

            const { data } = await request('POST', '/d1/database', { name: databaseName });
            const created = data.result || {};
            const id = created.uuid || created.id;
            console.log(`Created D1 database ${databaseName} (${id})`);
            return id;
          }

          function buildDeploymentConfig(environment, d1Id) {
            return {
              compatibility_date: compatibilityDate,
              d1_databases: {
                [bindingName]: {
                  id: d1Id
                }
              },
              env_vars: {
                ENVIRONMENT: {
                  type: 'plain_text',
                  value: environment
                }
              }
            };
          }

          async function ensurePagesProject(d1Id) {
            const payload = {
              name: projectName,
              production_branch: productionBranch,
              build_config: {
                destination_dir: 'public',
                root_dir: '/'
              },
              deployment_configs: {
                preview: buildDeploymentConfig('preview', d1Id),
                production: buildDeploymentConfig('production', d1Id)
              }
            };

            const current = await request('GET', `/pages/projects/${encodeURIComponent(projectName)}`, undefined, {
              allow404: true
            });

            if (!current.found) {
              await request('POST', '/pages/projects', payload);
              console.log(`Created Pages project ${projectName}`);
              return;
            }

            await request('PATCH', `/pages/projects/${encodeURIComponent(projectName)}`, payload);
            console.log(`Updated Pages project ${projectName}`);
          }

          await verifyToken();
          const d1Id = await ensureD1Database();
          await ensurePagesProject(d1Id);
          EOF

      - name: Apply D1 schema
        working-directory: pages
        run: npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --file ../db/schema.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Cloudflare Pages project
        working-directory: pages
        run: npx wrangler pages deploy ../public --project-name "$PAGES_PROJECT_NAME" --branch "${{ github.ref_name }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
